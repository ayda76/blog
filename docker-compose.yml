version: "3.9"

services:
  # =====================
  # PostgreSQL
  # =====================
  blog_db:
    image: postgres:17
    container_name: blog-db
    restart: always
    env_file:
      - ./backend/.env
    volumes:
      - pgdata:/var/lib/postgresql/data

      - ./db_blog.sql:/docker-entrypoint-initdb.d/db_blog.sql
    ports:
      - "5432:5432"

  blog_postgres_exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: blog_postgres_exporter
    env_file:
      - ./backend/.env
    environment:
      DATA_SOURCE_NAME: >
        postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?  sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      - blog_db

  # =====================
