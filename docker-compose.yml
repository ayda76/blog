  # =====================
  # Django Backend
  # =====================
  blog_backend:
    container_name: blog_backend
    build:
      context: ./backend
    command: >
      sh -c "
      python manage.py migrate --noinput &&
      python manage.py runserver 0.0.0.0:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=blog.settings
    volumes:
      - ./backend:/backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - blog_db
      # - blog_redis
      # - prometheus
